<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard • WellQuest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="wq-hero wq-glass">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <h1 class="h3 mb-1">Dashboard</h1>
          <div class="text-muted">Your quick view: points, boss status, and inventory.</div>
        </div>
        <div class="wq-glass p-3">
          <div class="text-muted small">My points</div>
          <div class="display-6 fw-bold" id="myPoints">—</div>
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-12 col-lg-6">
          <div class="wq-glass p-3 h-100" id="bossSummary">
            <div class="text-muted">Loading boss...</div>
          </div>
        </div>
        <div class="col-12 col-lg-6">
          <div class="wq-glass p-3 h-100" id="invSummary">
            <div class="text-muted">Loading inventory...</div>
          </div>
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-12 col-lg-4">
          <a class="wq-glass p-3 d-block" href="/challenges.html">
            <div class="fw-semibold">Manage Challenges</div>
            <div class="text-muted small">Create, edit, complete, view attempts.</div>
          </a>
        </div>
        <div class="col-12 col-lg-4">
          <a class="wq-glass p-3 d-block" href="/shop.html">
            <div class="fw-semibold">Spend Points</div>
            <div class="text-muted small">Buy boosters to increase raid damage.</div>
          </a>
        </div>
        <div class="col-12 col-lg-4">
          <a class="wq-glass p-3 d-block" href="/boss.html">
            <div class="fw-semibold">Boss Raid</div>
            <div class="text-muted small">Compete on the leaderboard with your damage.</div>
          </a>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/dashboard.js"></script>
</body>
</html>
