<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Boss Breaker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4 py-sm-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="wq-glass p-3 p-sm-4 auth-card">
          <h1 class="h3 fw-bold">Welcome back</h1>
          <p class="text-muted">Log in to view your points and manage challenges.</p>

          <form id="loginForm" class="mt-3">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input id="username" class="form-control" placeholder="e.g. jayden" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" autocomplete="current-password" required />
            </div>

            <button id="btnLogin" class="btn btn-primary w-100">Log in</button>

            <div class="text-muted small mt-3">
              No account? <a href="/register.html" class="text-decoration-underline">Create one</a>
            </div>
          </form>
        </div>

        <div class="mt-3 text-center text-muted small auth-tip">
          Tip: your token is stored in <span class="wq-code">localStorage</span> for this demo.
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/login.js"></script>
</body>
</html>
