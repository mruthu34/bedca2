<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Challenges • WellQuest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <section class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
      <div>
        <h1 class="h3 mb-1">Wellness Challenges</h1>
        <div class="text-muted">Create, complete, and manage challenges. <span class="wq-chip" id="pointsChip">...</span></div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-light" id="btnRefresh">Refresh</button>
        <button class="btn btn-primary" id="btnOpenCreate">+ New Challenge</button>
      </div>
    </section>

    <section class="row g-3" id="challengeList"></section>
  </main>

  <!-- Create/Edit Challenge Modal -->
  <div class="modal fade" id="challengeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content wq-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Create a Challenge</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="formChallenge">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="desc" rows="3" placeholder="e.g., Drink 2L of water today"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label">Points</label>
              <input class="form-control" id="pts" type="number" min="1" value="10" />
              <div class="form-text text-muted">Higher points = bigger rewards (and more boss damage per completion).</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btnSaveChallenge">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Completion Modal -->
  <div class="modal fade" id="completeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content wq-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="completeTitle">Complete Challenge</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="formComplete">
          <input type="hidden" id="completeChallengeId" />
          <div class="modal-body">
            <div class="mb-2 fw-semibold" id="completeDesc"></div>
            <div class="text-muted small mb-3" id="completePts"></div>
            <label class="form-label">Details (optional)</label>
            <textarea class="form-control" id="details" rows="3" placeholder="e.g., Completed after dinner and a walk"></textarea>
            <div class="form-text text-muted">Your details show up in Attempts.</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btnComplete">Complete</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/challenges.js"></script>
</body>
</html>
