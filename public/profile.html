<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Boss Breaker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h1 class="h3 mb-1">Profile</h1>
        <div class="text-muted">Your account summary and raid stats.</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="wq-badge" id="pointsChip"><i class="bi bi-stars"></i>...</span>
        <button id="btnRefresh" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-clockwise"></i>Refresh</button>
      </div>
    </div>

    <section class="card-plain p-3 mb-3">
      <div class="d-flex flex-wrap align-items-center gap-3">
        <div class="card-glass p-3">
          <div class="text-muted small">Username</div>
          <div class="h4 mb-0" id="profileName">-</div>
        </div>
        <div class="card-glass p-3">
          <div class="text-muted small">Current points</div>
          <div class="h4 mb-0" id="profilePoints">-</div>
        </div>
      </div>
    </section>

    <section class="row g-3 mb-3">
      <div class="col-12 col-lg-6">
        <div class="card-plain p-3 h-100">
          <div class="text-muted small">Total damage dealt</div>
          <div class="display-6 fw-bold" id="statDamage">-</div>
          <div class="text-muted small">Across all boss raids.</div>
        </div>
      </div>
      <div class="col-12 col-lg-6">
        <div class="card-plain p-3 h-100">
          <div class="text-muted small">Points spent on boss hits</div>
          <div class="display-6 fw-bold" id="statSpent">-</div>
          <div class="text-muted small">Only counts direct raid hits.</div>
        </div>
      </div>
    </section>

    <section class="card-plain p-3 border border-danger-subtle">
      <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
        <div>
          <div class="h5 mb-1 text-danger">Danger zone</div>
          <div class="text-muted">Deleting your account removes your data and cannot be undone.</div>
        </div>
        <button id="btnDeleteAccount" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i>Delete account</button>
      </div>
    </section>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/profile.js"></script>
</body>
</html>
