<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory - Boss Breaker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h1 class="h3 mb-1">Inventory</h1>
        <div class="text-muted">Use an item to boost your next completion or boss hit.</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="wq-badge" id="pointsChip"><i class="bi bi-stars"></i>...</span>
        <button id="btnRefresh" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-clockwise"></i>Refresh</button>
      </div>
    </div>

    <section class="card-accent p-3 mb-3" id="activeEffectBanner">
      <div class="wq-section-title mb-1"><i class="bi bi-lightning-charge"></i>Active Effect</div>
      <div class="text-muted small">No active item effect detected.</div>
    </section>

    <section class="card-plain p-3">
      <div id="invGrid"></div>
    </section>

    <div class="mt-3 text-muted small">
      <span class="fw-semibold">How it works:</span> when you use an item, the backend stores a temporary effect (bonus damage + multiplier) that applies to your next completion or hit.
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/inventory.js"></script>
</body>
</html>
