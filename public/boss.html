<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boss Raid • WellQuest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h3 m-0">Boss Raid</h1>
        <div class="text-muted small">Spend points to deal damage and climb the leaderboard.</div>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <span id="pointsChip" class="wq-chip">...</span>
        <button id="btnRefresh" class="btn btn-outline-light btn-sm">Refresh</button>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-6">
        <div class="wq-glass p-3" id="bossCard">
          <div class="text-muted">Loading boss...</div>
        </div>

        <div class="wq-glass p-3 mt-3">
          <div class="fw-semibold mb-2">Hit the Boss</div>
          <form id="formHit" class="row g-2 align-items-end">
            <div class="col-12 col-sm-8">
              <label class="form-label">Points to spend</label>
              <input id="pointsSpent" type="number" min="1" class="form-control" placeholder="e.g. 50" />
            </div>
            <div class="col-12 col-sm-4">
              <button id="btnHit" class="btn btn-primary w-100" type="submit">Attack</button>
            </div>
          </form>
          <div class="text-muted small mt-2">Damage uses any active item effect (bonus + multiplier) if applied from Inventory.</div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="wq-glass p-3">
          <div class="fw-semibold mb-2">Leaderboard</div>
          <div class="table-responsive">
            <table class="table table-dark table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>User</th>
                  <th>Total Damage</th>
                </tr>
              </thead>
              <tbody id="leaderboardBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/boss.js"></script>
</body>
</html>
