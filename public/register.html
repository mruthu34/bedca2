<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up • Boss Breaker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="wq-glass p-3 p-sm-4 auth-card">
          <h1 class="h3 fw-bold">Create your account</h1>
          <p class="text-muted">Start earning points from wellness challenges.</p>

          <form id="registerForm" class="mt-4">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input id="username" class="form-control" placeholder="e.g., Steve" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="email" type="email" class="form-control" placeholder="name@example.com" autocomplete="email" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" autocomplete="new-password" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm password</label>
              <input id="confirm" type="password" class="form-control" autocomplete="new-password" required />
            </div>

            <button id="btnRegister" class="btn btn-primary w-100" type="submit">Create account</button>

            <div class="text-muted small mt-3 auth-tip">
              Already have an account? <a href="/login.html" class="text-decoration-underline">Log in</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/register.js"></script>
</body>
</html>
