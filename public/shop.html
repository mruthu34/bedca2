<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop - Boss Breaker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
      <div>
        <h1 class="h3 mb-0">Shop</h1>
        <div class="text-muted small">Spend points on items to boost your next boss hit.</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span id="pointsChip" class="wq-pill"><i class="bi bi-stars"></i>--</span>
        <button id="btnRefresh" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-clockwise"></i>Refresh</button>
      </div>
    </div>

    <div class="mt-3" id="itemGrid"></div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/shop.js"></script>
</body>
</html>
